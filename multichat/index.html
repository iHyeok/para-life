<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chat — 다중채팅시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: oklch(0.985 0.004 80);
    --panel: oklch(1 0 0);
    --ink: oklch(0.22 0.01 60);
    --ink-2: oklch(0.45 0.008 60);
    --ink-3: oklch(0.62 0.006 60);
    --line: oklch(0.92 0.004 80);
    --line-2: oklch(0.88 0.005 80);
    --hover: oklch(0.96 0.006 80);
    --active: oklch(0.94 0.012 85);
    --accent: oklch(0.78 0.14 85);
    --accent-ink: oklch(0.28 0.06 70);
    --bubble-them: oklch(0.965 0.005 80);
    --danger: oklch(0.62 0.18 25);
    --radius: 14px;
    --density: 1;
  }
  html.dark {
    --bg: oklch(0.18 0.008 80);
    --panel: oklch(0.21 0.008 80);
    --ink: oklch(0.95 0.004 80);
    --ink-2: oklch(0.72 0.008 80);
    --ink-3: oklch(0.55 0.008 80);
    --line: oklch(0.27 0.008 80);
    --line-2: oklch(0.31 0.008 80);
    --hover: oklch(0.24 0.008 80);
    --active: oklch(0.28 0.014 85);
    --bubble-them: oklch(0.26 0.008 80);
    --accent-ink: oklch(0.22 0.05 70);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; font-feature-settings: 'cv11','ss01'; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Typing indicator */
  @keyframes blink { 0%,60%,100% { opacity: .25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-2px); } }
  .typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); margin: 0 1.5px; animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }

  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg-in { animation: msgIn .18s ease-out both; }

  .focus-ring:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  // Tweakable defaults — editable via Tweaks panel
  window.__TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "#E9B949",
    "density": "cozy",
    "dark": false,
    "showTimestamps": true,
    "avatarStyle": "initial"
  }/*EDITMODE-END*/;
</script>

<script type="text/babel" src="src/channels.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/components.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
